name: Actualizar datos del campo

on:
  push:
    paths:
      - 'data/**'   # se activa cuando cambia cualquier archivo en /data/
  workflow_dispatch:  # permite correrlo manualmente desde GitHub

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Instalar Python y dependencias
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar librerías
        run: |
          pip install geopandas pandas openpyxl shapely pyproj fiona

      - name: Generar data.json
        run: python generate_data.py

      - name: Commitear y pushear data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/la_alicia.json
          git diff --staged --quiet || git commit -m "Auto: actualizar data.json"
          git push
